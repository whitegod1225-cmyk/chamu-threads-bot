<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ちゃむ。ダッシュボード</title>
<style>
:root{
  --bg:#0d0d18;
  --surface:#14141f;
  --surface2:#1c1c2e;
  --border:#26263a;
  --border2:#32324a;
  --text:#e2e8f0;
  --muted:#64748b;
  --dim:#475569;
  --pink:#e879a0;
  --pink-dim:#7c1d42;
  --cat-a:#a78bfa;
  --cat-b:#60a5fa;
  --cat-e:#fb923c;
  --cat-f:#34d399;
  --cat-a-bg:rgba(167,139,250,.12);
  --cat-b-bg:rgba(96,165,250,.12);
  --cat-e-bg:rgba(251,146,60,.12);
  --cat-f-bg:rgba(52,211,153,.12);
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px;}

/* ── Header ── */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.logo{font-weight:700;font-size:16px;letter-spacing:.04em;color:var(--pink);}
.logo span{color:var(--text);font-weight:400;}
.stats-row{display:flex;gap:20px;}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  font-size:12px;color:var(--muted);
}
.stat-chip strong{color:var(--text);font-size:15px;}

/* ── Tabs ── */
.tabs{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  display:flex;gap:0;
}
.tab{
  padding:12px 20px;
  font-size:13px;font-weight:500;
  color:var(--muted);
  border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;
}
.tab:hover{color:var(--text);}
.tab.active{color:var(--pink);border-bottom-color:var(--pink);}

/* ── Layout ── */
.main{padding:20px 24px;max-width:1200px;margin:0 auto;}
.panel{display:none;}
.panel.active{display:block;}

/* ── Queue panel ── */
.queue-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.queue-header h2{font-size:15px;font-weight:600;}
.queue-meta{font-size:12px;color:var(--muted);}

.post-list{display:flex;flex-direction:column;gap:6px;}

.post-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:12px 14px;
  display:grid;
  grid-template-columns:32px 36px 1fr auto;
  gap:10px;
  align-items:center;
  transition:border-color .15s,background .15s;
  cursor:default;
}
.post-card:hover{border-color:var(--border2);background:var(--surface2);}
.post-card.next-up{border-color:var(--pink);box-shadow:0 0 0 1px var(--pink-dim);}

.pos-num{
  font-size:11px;font-weight:700;
  color:var(--dim);font-variant-numeric:tabular-nums;
  text-align:right;
}
.post-card.next-up .pos-num{color:var(--pink);}

.cat-badge{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;
}
.cat-A{background:var(--cat-a-bg);color:var(--cat-a);}
.cat-B{background:var(--cat-b-bg);color:var(--cat-b);}
.cat-E{background:var(--cat-e-bg);color:var(--cat-e);}
.cat-F{background:var(--cat-f-bg);color:var(--cat-f);}
.cat-?{background:rgba(255,255,255,.06);color:var(--muted);}

.post-info{}
.post-theme{
  font-size:13px;font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  max-width:580px;
}
.post-theme-full{display:none;}
.post-sub{
  display:flex;gap:8px;align-items:center;
  margin-top:3px;
}
.post-product{font-size:11px;color:var(--muted);}
.season-tag{
  font-size:10px;padding:1px 7px;border-radius:20px;
  background:rgba(255,255,255,.05);color:var(--dim);
  white-space:nowrap;
}
.expand-btn{
  font-size:11px;color:var(--muted);background:transparent;border:none;cursor:pointer;padding:0;
}
.expand-btn:hover{color:var(--text);}

.post-body-preview{
  display:none;
  grid-column:2/-1;
  margin-top:8px;
  padding:10px 12px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border);
  border-radius:6px;
  font-size:12px;line-height:1.7;
  white-space:pre-wrap;
  color:var(--muted);
}
.post-body-preview.visible{display:block;}

.post-actions{
  display:flex;gap:4px;flex-shrink:0;
}
.btn-icon{
  width:28px;height:28px;border-radius:5px;
  background:transparent;border:1px solid var(--border);
  color:var(--muted);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s,color .1s,border-color .1s;
}
.btn-icon:hover{background:var(--surface2);color:var(--text);border-color:var(--border2);}
.btn-icon.danger:hover{background:rgba(248,113,113,.1);color:#f87171;border-color:rgba(248,113,113,.3);}

/* ── Generate panel ── */
.gen-grid{display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start;}
@media(max-width:900px){.gen-grid{grid-template-columns:1fr;}}

.gen-form-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
}
.gen-form-card h2{font-size:14px;font-weight:600;margin-bottom:16px;}

.mode-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.mode-tab{
  padding:6px 14px;border-radius:20px;
  font-size:12px;font-weight:500;
  border:1px solid var(--border2);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:all .15s;
}
.mode-tab:hover{color:var(--text);border-color:var(--text);}
.mode-tab.active{background:var(--pink);color:#fff;border-color:var(--pink);}

label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase;}
textarea,input[type=text]{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:6px;padding:9px 11px;
  color:var(--text);font-family:inherit;font-size:13px;
  resize:vertical;outline:none;
  transition:border-color .15s;
}
textarea:focus,input[type=text]:focus{border-color:var(--pink);}
textarea{min-height:140px;line-height:1.6;}
.form-group{margin-bottom:14px;}

.btn-generate{
  width:100%;padding:11px;margin-top:6px;
  background:var(--pink);color:#fff;
  border:none;border-radius:6px;
  font-size:13px;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .1s;
}
.btn-generate:hover{opacity:.9;}
.btn-generate:active{transform:scale(.98);}
.btn-generate:disabled{opacity:.4;cursor:wait;}

.gen-result-area h2{font-size:14px;font-weight:600;margin-bottom:14px;}
.gen-post-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:12px;
}
.gen-post-card .label-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;
}
.gen-post-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.gen-post-body{
  white-space:pre-wrap;font-size:13px;line-height:1.7;
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:5px;padding:10px 12px;margin-bottom:8px;
  color:var(--text);
}
.gen-post-comment{
  white-space:pre-wrap;font-size:12px;line-height:1.6;
  color:var(--muted);padding:8px 12px;
  background:rgba(255,255,255,.02);border-radius:5px;
  border:1px dashed var(--border);
  margin-bottom:10px;
}
.gen-add-row{display:flex;gap:8px;align-items:center;}
.btn-add{
  padding:6px 14px;border-radius:5px;
  background:rgba(232,121,160,.15);color:var(--pink);
  border:1px solid var(--pink-dim);font-size:12px;font-weight:600;cursor:pointer;
  transition:background .15s;
}
.btn-add:hover{background:rgba(232,121,160,.25);}
.btn-add:disabled{opacity:.4;cursor:default;}
.add-result{font-size:11px;color:var(--cat-f);}

.char-count{font-size:11px;color:var(--muted);}

/* ── Stats panel ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px;}
.stats-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px;
}
.stats-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
.stats-card .value{font-size:32px;font-weight:700;line-height:1;}
.stats-card .sub{font-size:11px;color:var(--muted);margin-top:4px;}

.cat-breakdown{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin-bottom:14px;
}
.cat-breakdown h3{font-size:13px;font-weight:600;margin-bottom:16px;color:var(--muted);}
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.cat-bar-label{width:24px;text-align:center;}
.cat-bar-track{flex:1;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .5s ease;}
.cat-bar-count{font-size:12px;color:var(--muted);width:60px;text-align:right;}

.next-post-card{
  background:var(--surface);border:1px solid var(--pink);
  border-radius:var(--radius);padding:18px;
  box-shadow:0 0 0 1px var(--pink-dim);
}
.next-post-card .label{font-size:11px;color:var(--pink);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;}
.next-post-card .theme{font-size:15px;font-weight:600;margin-bottom:6px;}
.next-post-card .meta{font-size:12px;color:var(--muted);}

/* ── Loader ── */
.loader{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:var(--muted);padding:12px 0;
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--pink);
  animation:blink 1.2s infinite ease-in-out;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.1);}}

/* ── Toasts ── */
#toast{
  position:fixed;bottom:20px;right:20px;
  background:#1e2a3a;border:1px solid #334155;
  border-radius:8px;padding:10px 16px;
  font-size:13px;color:var(--text);
  transform:translateY(80px);opacity:0;
  transition:transform .3s,opacity .3s;
  z-index:200;
}
#toast.show{transform:translateY(0);opacity:1;}
#toast.ok{border-color:var(--cat-f);color:var(--cat-f);}
#toast.err{border-color:#f87171;color:#f87171;}

/* ── Empty state ── */
.empty{
  text-align:center;padding:60px 20px;
  color:var(--dim);font-size:13px;
  background:rgba(255,255,255,.02);
  border:1px dashed var(--border);
  border-radius:var(--radius);
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">ちゃむ。<span>DASHBOARD</span></div>
  <div class="stats-row" id="headerStats">
    <div class="stat-chip"><strong id="hQueueTotal">—</strong>本 キュー残り</div>
    <div class="stat-chip"><strong id="hHistoryTotal">—</strong>本 投稿済み</div>
    <div class="stat-chip"><strong id="hAffiliRatio">—</strong>% アフィリ率</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('queue')">キュー管理</button>
  <button class="tab"        onclick="switchTab('generate')">投稿生成</button>
  <button class="tab"        onclick="switchTab('stats')">分析</button>
</div>

<div class="main">

  <!-- ── QUEUE PANEL ── -->
  <div class="panel active" id="panel-queue">
    <div class="queue-header">
      <h2>投稿キュー</h2>
      <span class="queue-meta" id="queueMeta"></span>
    </div>
    <div class="post-list" id="postList">
      <div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div> 読み込み中...</div>
    </div>
  </div>

  <!-- ── GENERATE PANEL ── -->
  <div class="panel" id="panel-generate">
    <div class="gen-grid">

      <div class="gen-form-card">
        <h2>投稿を生成する</h2>
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="normal"       onclick="setMode('normal')">通常投稿</button>
          <button class="mode-tab"        data-mode="consultation" onclick="setMode('consultation')">相談ルーティング</button>
          <button class="mode-tab"        data-mode="affiliate"    onclick="setMode('affiliate')">アフィリ</button>
        </div>
        <div class="form-group">
          <label id="inputLabel">テーマ</label>
          <textarea id="genInput" placeholder="テーマを入力（例：夜泣きで限界だった夜の乗り越え方）"></textarea>
        </div>
        <div class="form-group" id="productGroup" style="display:none">
          <label>商品名（任意）</label>
          <input type="text" id="productInput" placeholder="例：ベビーカーシート ファン付き">
        </div>
        <button class="btn-generate" id="genBtn" onclick="generate()">この条件で生成する</button>
        <div id="genLoader" style="display:none">
          <div class="loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div> Claude が生成中...</div>
        </div>
        <div id="genError" style="display:none;font-size:12px;color:#f87171;margin-top:10px;"></div>
      </div>

      <div class="gen-result-area">
        <h2 id="genResultTitle" style="display:none">生成結果</h2>
        <div id="genResults"></div>
      </div>

    </div>
  </div>

  <!-- ── STATS PANEL ── -->
  <div class="panel" id="panel-stats">
    <div class="stats-grid" id="statsCards"></div>
    <div class="cat-breakdown">
      <h3>カテゴリ内訳</h3>
      <div id="catBars"></div>
    </div>
    <div id="nextPostArea"></div>
  </div>

</div>

<div id="toast"></div>

<script>
const CAT_LABELS = {A:'自己紹介', B:'知識・共感', E:'アフィリ', F:'本音', '?':'その他'};
const CAT_COLORS = {A:'var(--cat-a)', B:'var(--cat-b)', E:'var(--cat-e)', F:'var(--cat-f)', '?':'var(--dim)'};

let currentMode = 'normal';

// ── Tab switching ──────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'queue')    loadQueue();
  if (name === 'stats')    loadStats();
}

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

// ── API helpers ────────────────────────────────────────────
async function api(path, opts={}) {
  const res = await fetch(path, {
    headers: {'Content-Type':'application/json'},
    ...opts
  });
  return res.json();
}

// ── Queue ──────────────────────────────────────────────────
async function loadQueue() {
  const [posts, stats] = await Promise.all([
    api('/api/queue'),
    api('/api/stats'),
  ]);

  // Update header stats
  document.getElementById('hQueueTotal').textContent   = stats.queue_total;
  document.getElementById('hHistoryTotal').textContent  = stats.history_total;
  document.getElementById('hAffiliRatio').textContent   = stats.affiliate_ratio;
  document.getElementById('queueMeta').textContent      = `${stats.queue_total}本 待機中`;

  renderQueue(posts);
}

function renderQueue(posts) {
  const list = document.getElementById('postList');
  if (!posts.length) {
    list.innerHTML = '<div class="empty">キューに投稿がありません</div>';
    return;
  }
  list.innerHTML = posts.map((p, i) => postCardHTML(p, i)).join('');
}

function postCardHTML(p, idx) {
  const isNext = idx === 0;
  const catClass = `cat-${p.category in {A:1,B:1,E:1,F:1} ? p.category : '?'}`;
  const previewId = `preview-${p.id}`;
  const bodyText = (p.body || '').slice(0, 300) + (p.body.length > 300 ? '...' : '');
  const commentText = p.comment ? '\n\n[コメント欄]\n' + (p.comment || '').slice(0, 200) : '';
  const productSpan = p.product ? `<span class="post-product">${esc(p.product)}</span>` : '';
  return `
<div class="post-card${isNext?' next-up':''}" id="card-${p.id}">
  <div class="pos-num">${idx+1}</div>
  <div class="cat-badge ${catClass}">${p.category}</div>
  <div class="post-info">
    <div class="post-theme">${esc(p.theme)}</div>
    <div class="post-sub">
      ${productSpan}
      <span class="season-tag">${esc(p.season)}</span>
      <button class="expand-btn" onclick="togglePreview(${p.id})" title="本文を見る">▾</button>
    </div>
    <div class="post-body-preview" id="${previewId}">${esc(bodyText + commentText)}</div>
  </div>
  <div class="post-actions">
    <button class="btn-icon" onclick="movePost(${p.id},'up')"   title="上に移動">↑</button>
    <button class="btn-icon" onclick="movePost(${p.id},'down')" title="下に移動">↓</button>
    <button class="btn-icon danger" onclick="deletePost(${p.id})" title="削除">✕</button>
  </div>
</div>`;
}

function esc(str) {
  return (str||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function togglePreview(id) {
  const el = document.getElementById(`preview-${id}`);
  el.classList.toggle('visible');
}

async function movePost(id, direction) {
  await api('/api/queue/move', {method:'POST', body:JSON.stringify({id, direction})});
  await loadQueue();
}

async function deletePost(id) {
  if (!confirm(`投稿${id}を削除しますか？`)) return;
  await api(`/api/queue/${id}`, {method:'DELETE'});
  toast(`投稿${id}を削除しました`);
  await loadQueue();
}

// ── Generate ───────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  const labels = {normal:'テーマ', consultation:'相談文', affiliate:'商品・テーマ'};
  const phs    = {
    normal:       'テーマを入力（例：夜泣きで限界だった夜の乗り越え方）',
    consultation: '相談文をそのまま貼り付けてください',
    affiliate:    '商品カテゴリまたは商品名を入力（例：ベビーカーシート ファン付き）',
  };
  document.getElementById('inputLabel').textContent        = labels[mode];
  document.getElementById('genInput').placeholder          = phs[mode];
  document.getElementById('productGroup').style.display    = mode === 'affiliate' ? 'block' : 'none';
}

async function generate() {
  const content = document.getElementById('genInput').value.trim();
  if (!content) { toast('テーマを入力してください', 'err'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('genLoader').style.display = 'block';
  document.getElementById('genError').style.display  = 'none';
  document.getElementById('genResults').innerHTML    = '';
  document.getElementById('genResultTitle').style.display = 'none';

  try {
    const data = await api('/api/generate', {
      method: 'POST',
      body: JSON.stringify({mode: currentMode, content}),
    });
    if (data.error) throw new Error(data.error);

    renderGenResults(data.posts || []);
  } catch(e) {
    document.getElementById('genError').style.display = 'block';
    document.getElementById('genError').textContent   = e.message;
    toast('生成に失敗しました', 'err');
  } finally {
    btn.disabled = false;
    document.getElementById('genLoader').style.display = 'none';
  }
}

function renderGenResults(posts) {
  if (!posts.length) return;
  document.getElementById('genResultTitle').style.display = 'block';

  document.getElementById('genResults').innerHTML = posts.map((p, i) => {
    const bodyLen = (p.body||'').length;
    return `
<div class="gen-post-card" id="gp-${i}">
  <div class="label-row">
    <span class="gen-post-label">投稿 ${i+1}／${posts.length} ─ ${esc(p.category_full||p.category)}</span>
    <span class="char-count">${bodyLen}字</span>
  </div>
  <div class="gen-post-body">${esc(p.body||'')}</div>
  <div class="gen-post-comment">${esc(p.comment||'')}</div>
  <div class="gen-add-row">
    <button class="btn-add" onclick="addToQueue(${i})" id="addbtn-${i}">キューに追加</button>
    <span class="add-result" id="addresult-${i}"></span>
  </div>
</div>`;
  }).join('');

  // Store posts globally for add action
  window._genPosts = posts;
}

async function addToQueue(idx) {
  const p = window._genPosts[idx];
  if (!p) return;
  const btn = document.getElementById(`addbtn-${idx}`);
  btn.disabled = true;
  btn.textContent = '追加中...';

  const res = await api('/api/queue/add', {
    method: 'POST',
    body: JSON.stringify(p),
  });

  if (res.ok) {
    const pos = res.position;
    const prev = res.prev_id ? `投稿${res.prev_id}` : '先頭';
    const next = res.next_id ? `投稿${res.next_id}` : '末尾';
    document.getElementById(`addresult-${idx}`).textContent = `✓ 投稿${res.id}として ${pos}番目に追加（${prev}→新規→${next}）`;
    btn.textContent = '追加済み';
    toast(`投稿${res.id}をキュー${pos}番目に追加しました`);
    // Also update header stats quietly
    api('/api/stats').then(s => {
      document.getElementById('hQueueTotal').textContent = s.queue_total;
    });
  } else {
    btn.disabled = false;
    btn.textContent = 'キューに追加';
    toast('追加に失敗しました', 'err');
  }
}

// ── Stats ──────────────────────────────────────────────────
async function loadStats() {
  const stats = await api('/api/stats');

  const cards = [
    {label:'キュー残り', value: stats.queue_total, sub:'本待機中'},
    {label:'総投稿数',   value: stats.history_total, sub:'投稿済み'},
    {label:'アフィリ率', value: stats.affiliate_ratio + '%', sub:'カテゴリEの割合'},
    {label:'次の投稿',   value: stats.next_post ? `#${stats.next_post.id}` : '—', sub: stats.next_post ? stats.next_post.category : ''},
  ];
  document.getElementById('statsCards').innerHTML = cards.map(c => `
<div class="stats-card">
  <div class="label">${c.label}</div>
  <div class="value">${c.value}</div>
  <div class="sub">${c.sub}</div>
</div>`).join('');

  // Category bars
  const cats = stats.categories || {};
  const total = stats.queue_total || 1;
  const order = ['A','B','E','F'];
  document.getElementById('catBars').innerHTML = order.map(cat => {
    const count = cats[cat] || 0;
    const pct   = Math.round(count / total * 100);
    return `
<div class="cat-bar-row">
  <div class="cat-badge cat-${cat} cat-bar-label">${cat}</div>
  <div style="font-size:11px;color:var(--muted);width:70px;">${CAT_LABELS[cat]}</div>
  <div class="cat-bar-track">
    <div class="cat-bar-fill" style="width:${pct}%;background:${CAT_COLORS[cat]};"></div>
  </div>
  <div class="cat-bar-count">${count}本 (${pct}%)</div>
</div>`;
  }).join('');

  // Next post card
  if (stats.next_post) {
    const p = stats.next_post;
    document.getElementById('nextPostArea').innerHTML = `
<div class="next-post-card">
  <div class="label">NEXT UP — 次回投稿</div>
  <div class="theme">「${esc(p.theme)}」</div>
  <div class="meta">${esc(p.category_full)} ／ ${esc(p.season)}</div>
</div>`;
  }
}

// ── Init ───────────────────────────────────────────────────
loadQueue();
api('/api/stats').then(s => {
  document.getElementById('hQueueTotal').textContent   = s.queue_total;
  document.getElementById('hHistoryTotal').textContent  = s.history_total;
  document.getElementById('hAffiliRatio').textContent   = s.affiliate_ratio;
});
</script>

name: Threads Fetch Metrics

on:
  schedule:
    - cron: '0 15 * * *'   # JST 0:00 毎日深夜に取得
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run fetcher script
        timeout-minutes: 3
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          PYTHONUNBUFFERED: "1"
        run: python -u skills/queue/fetcher.py

      - name: Commit metrics update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/queue/post-history.md skills/queue/analysis-latest.md
          git diff --cached --quiet || git commit -m "chore: update engagement metrics"
          git pull --rebase origin main
          git push

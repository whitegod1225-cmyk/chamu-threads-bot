name: Product Scraper（楽天ランキング商品候補収集）

on:
  schedule:
    # 毎週月曜 9:00 JST（UTC 0:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:
    # 手動実行にも対応（GitHub ActionsのUIから実行可能）

concurrency:
  group: product-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv requests

      - name: Run product scraper
        timeout-minutes: 5
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY:     ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID:   ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          RAKUTEN_APP_URL:        https://github.com
          CI: "true"
        run: python -u skills/queue/product-scraper.py

      - name: Commit new candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/queue/affiliate-topics.md
          git diff --cached --quiet || git commit -m "chore: 楽天ランキング商品候補を自動追加 $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

name: Threads Auto Post

on:
  schedule:
    # 平日（月〜金 JST）※祝日はcronでは区別不可
    - cron: '50 21 * * 0-4'  # 06:50 JST（UTC日〜木 21:50）
    - cron: '10 0 * * 1-5'   # 09:10 JST
    - cron: '5 3 * * 1-5'    # 12:05 JST
    - cron: '30 8 * * 1-5'   # 17:30 JST
    # 土日（JST）
    - cron: '10 23 * * 5,6'  # 08:10 JST（UTC金〜土 23:10）
    - cron: '10 2 * * 0,6'   # 11:10 JST
    - cron: '5 5 * * 0,6'    # 14:05 JST
    - cron: '10 9 * * 0,6'   # 18:10 JST
  workflow_dispatch:

concurrency:
  group: post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run post script
        timeout-minutes: 2
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          PYTHONUNBUFFERED: "1"
        run: python -u skills/queue/post.py

      - name: Commit queue update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/queue/post-queue.md skills/queue/post-history.md skills/queue/post-log.txt skills/queue/last-post-hash.txt
          git diff --cached --quiet || git commit -m "chore: update post queue"
          git pull --rebase origin main
          git push
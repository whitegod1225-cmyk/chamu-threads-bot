name: Threads Auto Post

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 0 * * *'
    - cron: '0 3 * * *'
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run post script
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python skills/queue/post.py

      - name: Commit queue update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/queue/post-queue.md skills/queue/post-history.md skills/queue/post-log.txt
          git diff --cached --quiet || git commit -m "chore: update post queue"
          git push
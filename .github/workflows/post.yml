name: Threads Auto Post

on:
  schedule:
    # 平日（月〜金）
    - cron: '0 21 * * 1-5'  # 06:00 JST
    - cron: '0 0 * * 1-5'   # 09:00 JST
    - cron: '0 3 * * 1-5'   # 12:00 JST
    - cron: '0 8 * * 1-5'   # 17:00 JST
    - cron: '0 10 * * 1-5'  # 19:00 JST
    - cron: '0 12 * * 1-5'  # 21:00 JST
    # 土日
    - cron: '0 0 * * 0,6'   # 09:00 JST
    - cron: '0 3 * * 0,6'   # 12:00 JST
    - cron: '0 6 * * 0,6'   # 15:00 JST
    - cron: '0 9 * * 0,6'   # 18:00 JST
    - cron: '0 12 * * 0,6'  # 21:00 JST
  workflow_dispatch:

concurrency:
  group: post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run post script
        timeout-minutes: 2
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          PYTHONUNBUFFERED: "1"
        run: python -u skills/queue/post.py

      - name: Commit queue update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/queue/post-queue.md skills/queue/post-history.md skills/queue/post-log.txt skills/queue/last-post-hash.txt
          git diff --cached --quiet || git commit -m "chore: update post queue"
          git pull --rebase origin main
          git push
name: Threads Auto Post

on:
  schedule:
    # 平日（月〜金 JST）※祝日はcronでは区別不可
    - cron: '50 20 * * 0-4'  # 05:50 JST（UTC日〜木 20:50）
    - cron: '40 23 * * 0-4'  # 08:40 JST（UTC日〜木 23:40）
    - cron: '20 3 * * 1-5'   # 12:20 JST
    - cron: '40 8 * * 1-5'   # 17:40 JST
    - cron: '30 11 * * 1-5'  # 20:30 JST
    - cron: '0 14 * * 1-5'   # 23:00 JST
    # 土日（JST）
    - cron: '20 22 * * 5,6'  # 07:20 JST（UTC金〜土 22:20）
    - cron: '20 2 * * 0,6'   # 11:20 JST
    - cron: '30 5 * * 0,6'   # 14:30 JST
    - cron: '0 10 * * 0,6'   # 19:00 JST
    - cron: '10 13 * * 0,6'  # 22:10 JST
  workflow_dispatch:

concurrency:
  group: post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run post script
        timeout-minutes: 2
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          PYTHONUNBUFFERED: "1"
        run: python -u skills/queue/post.py

      - name: Commit queue update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/queue/post-queue.md skills/queue/post-history.md skills/queue/post-log.txt skills/queue/last-post-hash.txt
          git diff --cached --quiet || git commit -m "chore: update post queue"
          git pull --rebase origin main
          git push
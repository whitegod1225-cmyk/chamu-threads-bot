name: Threads Auto Post

on:
  schedule:
    # 平日（月〜金 JST）※GitHub Actionsの遅延を考慮して15分前倒し設定
    # 目標投稿時刻の約15分前にトリガー → 実際の投稿は目標時刻±数分に収まる
    - cron: '45 20 * * 0-4'  # → 目標 06:00 JST
    - cron: '45 23 * * 0-4'  # → 目標 09:00 JST
    - cron: '15 3 * * 1-5'   # → 目標 12:30 JST
    - cron: '45 8 * * 1-5'   # → 目標 18:00 JST
    - cron: '45 11 * * 1-5'  # → 目標 21:00 JST
    - cron: '45 13 * * 1-5'  # → 目標 23:00 JST
    # 土日（JST）
    - cron: '15 22 * * 5,6'  # → 目標 07:30 JST
    - cron: '15 2 * * 0,6'   # → 目標 11:30 JST
    - cron: '45 5 * * 0,6'   # → 目標 15:00 JST
    - cron: '45 9 * * 0,6'   # → 目標 19:00 JST
    - cron: '45 12 * * 0,6'  # → 目標 22:00 JST
  workflow_dispatch:

concurrency:
  group: post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run post script
        timeout-minutes: 2
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          PYTHONUNBUFFERED: "1"
        run: python -u skills/queue/post.py

      - name: Commit queue update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/queue/post-queue.md skills/queue/post-history.md skills/queue/post-log.txt skills/queue/last-post-hash.txt
          git diff --cached --quiet || git commit -m "chore: update post queue"
          git pull --rebase origin main
          git push